<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KneeSense - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ks-blue: #1a3a6b;
            --ks-teal: #0d7e8a;
            --ks-dark: #0f2444;
            --ks-light: #7ecdd4;
            --background: #eef3f8;
            --text-dark: #0f2444;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            background: var(--background);
            position: relative;
        }

        /* ─── BACKGROUND SHAPES ─── */
        .bg-shape {
            position: fixed;
            filter: opacity(0.10);
            z-index: 0;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            animation: float 10s infinite alternate ease-in-out;
        }
        .bg-shape-1 { width: 620px; height: 620px; top: -120px; left: -120px; background: var(--ks-blue); }
        .bg-shape-2 { width: 420px; height: 420px; bottom: -60px; right: -60px; background: var(--ks-teal); animation-delay: -2s; }
        @keyframes float {
            from { transform: translate(0,0) rotate(0deg); }
            to   { transform: translate(30px,40px) rotate(10deg); }
        }

        /* ─── WRAPPER ─── */
        #wrapper {
            position: relative;
            z-index: 1;
            width: 200vw;
            height: 100vh;
            display: flex;
            will-change: transform;
            transition: transform 0.85s cubic-bezier(0.76, 0, 0.24, 1);
        }
        #wrapper.slide-done { transform: translateX(-100vw); }

        /* ─── SPLASH PANEL ─── */
        #splash {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            flex-shrink: 0;
        }

        .splash-logo {
            width: 150px; height: 150px;
            background: var(--white);
            border-radius: 30px;
            box-shadow: 0 24px 70px rgba(13,126,138,0.22);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            opacity: 0;
            transform: translateY(30px) scale(0.85);
            animation: popIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
        }
        .splash-logo img { width: 120px; height: auto; }

        .splash-title {
            font-family: 'Raleway', sans-serif;
            font-size: clamp(2.4rem, 6vw, 4rem);
            font-weight: 900;
            color: var(--ks-dark);
            letter-spacing: -1px;
            opacity: 0;
            transform: translateY(20px);
            animation: popIn 0.6s cubic-bezier(0.34, 1.3, 0.64, 1) 0.7s forwards;
        }
        .splash-title span { color: var(--ks-teal); }

        .splash-subtitle {
            font-size: 0.9rem;
            color: var(--ks-teal);
            font-weight: 600;
            letter-spacing: 3.5px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeUp 0.5s ease 1.1s forwards;
        }

        .splash-loader {
            margin-top: 20px;
            width: 160px; height: 3px;
            background: rgba(13,126,138,0.12);
            border-radius: 999px;
            overflow: hidden;
            opacity: 0;
            animation: fadeUp 0.4s ease 1.3s forwards;
        }
        .splash-loader-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--ks-blue), var(--ks-teal));
            border-radius: 999px;
            width: 0%;
            animation: loadBar 1.4s ease 1.5s forwards;
        }

        @keyframes popIn { to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes fadeUp { to { opacity: 1; } }
        @keyframes loadBar { to { width: 100%; } }

        /* ─── LOGIN PANEL ─── */
        #loginPanel {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .login-card {
            background: var(--white);
            padding: 48px 44px;
            border-radius: 18px;
            box-shadow: 0 24px 70px rgba(13,126,138,0.15);
            width: 90%; max-width: 440px;
            text-align: center;
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 0.5s ease 0.2s, transform 0.5s ease 0.2s;
        }
        #wrapper.slide-done .login-card { opacity: 1; transform: translateY(0); }

        .logo-area {
            margin-bottom: 26px;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .logo-img { width: 90px; height: auto; }
        .brand-name {
            font-family: 'Raleway', sans-serif;
            font-size: 1.55rem; font-weight: 900;
            color: var(--ks-blue); letter-spacing: 0.5px;
        }
        .brand-name span { color: var(--ks-teal); }
        .brand-sub {
            font-size: 0.72rem; color: var(--ks-teal);
            letter-spacing: 2.5px; text-transform: uppercase; font-weight: 600;
        }

        h2 {
            color: var(--text-dark); margin-bottom: 26px;
            font-size: 1.4rem; font-family: 'Raleway', sans-serif;
            font-weight: 700; text-align: left;
        }

        .input-container { position: relative; margin-bottom: 20px; }
        input {
            width: 100%; padding: 14px 16px;
            border: 1.5px solid #d1dce8; border-radius: 8px;
            font-size: 1rem; outline: none;
            transition: all 0.2s; background: #fdfdfd;
            font-family: 'Inter', sans-serif;
        }
        label {
            position: absolute; left: 16px; top: 14px;
            color: #8899aa; pointer-events: none;
            transition: all 0.2s ease;
            background: white; padding: 0 4px; font-size: 0.95rem;
        }
        input:focus ~ label,
        input:not(:placeholder-shown) ~ label {
            top: -10px; left: 12px;
            font-size: 0.78rem; color: var(--ks-teal); font-weight: 600;
        }
        input:focus { border-color: var(--ks-teal); box-shadow: 0 0 0 3px rgba(13,126,138,0.12); }

        .btn-login {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--ks-blue), var(--ks-teal));
            color: white; border: none; border-radius: 30px;
            font-size: 1rem; font-weight: 700; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            margin-top: 8px; font-family: 'Raleway', sans-serif; letter-spacing: 0.5px;
        }
        .btn-login:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 10px 28px rgba(13,126,138,0.3); }
        .btn-login:disabled { opacity: 0.65; cursor: not-allowed; }

        .error-msg {
            background: #fef2f2; color: #dc2626;
            border: 1px solid #fecaca; border-radius: 8px;
            padding: 10px 14px; font-size: 0.85rem;
            margin-bottom: 16px; text-align: left; display: none;
        }

        .links { margin-top: 20px; display: flex; justify-content: space-between; font-size: 0.82rem; }
        .links a { color: var(--ks-teal); text-decoration: none; font-weight: 600; }
        .links a:hover { text-decoration: underline; }

        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
            border-radius: 50%; animation: spin 0.7s linear infinite;
            vertical-align: middle; margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-config {
            position: fixed; inset: 0; background: var(--background);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; flex-direction: column; gap: 12px;
        }
        .loading-config .spinner { width: 28px; height: 28px; border-color: rgba(13,126,138,0.2); border-top-color: var(--ks-teal); }
        .loading-config p { font-size: 0.85rem; color: var(--ks-teal); font-weight: 500; }

        /* ─── DIVIDER ─── */
        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 18px 0; color: #aab4c0; font-size: 0.8rem; font-weight: 600;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: #e2e8f0;
        }

        /* ─── GOOGLE BUTTON ─── */
        .btn-google {
            width: 100%; padding: 13px 16px;
            background: white; color: #3c4043;
            border: 1.5px solid #dadce0; border-radius: 30px;
            font-size: 0.95rem; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-google:hover:not(:disabled) {
            border-color: #aab4c0;
            box-shadow: 0 4px 16px rgba(0,0,0,0.10);
            transform: scale(1.02);
        }
        .btn-google:disabled { opacity: 0.65; cursor: not-allowed; }
        .btn-google svg { flex-shrink: 0; }
    </style>
</head>
<body>

    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <!-- Config loading overlay -->
    <div class="loading-config" id="configLoader">
        <div class="spinner"></div>
        <p>Starting up…</p>
    </div>

    <div id="wrapper">
        <!-- ── SPLASH ── -->
        <div id="splash">
            <div class="splash-logo">
                <img src="kneesense-logo.png" alt="KneeSense Logo">
            </div>
            <div class="splash-title">Knee<span>Sense</span></div>
            <div class="splash-subtitle">Smart Rehabilitation</div>
            <div class="splash-loader">
                <div class="splash-loader-bar"></div>
            </div>
        </div>

        <!-- ── LOGIN ── -->
        <div id="loginPanel">
            <div class="login-card">
                <div class="logo-area">
                    <img src="kneesense-logo.png" alt="KneeSense Logo" class="logo-img">
                    <span class="brand-name">Knee<span>Sense</span>™</span>
                    <span class="brand-sub">Therapist Portal</span>
                </div>

                <h2>Welcome back</h2>

                <div id="errorMsg" class="error-msg"></div>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="input-container">
                        <input type="email" id="email" placeholder=" " required autocomplete="email">
                        <label for="email">Email address</label>
                    </div>
                    <div class="input-container">
                        <input type="password" id="password" placeholder=" " required autocomplete="current-password">
                        <label for="password">Password</label>
                    </div>
                    <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
                </form>

                <div class="divider">or</div>

                <button class="btn-google" id="googleBtn" onclick="signInWithGoogle()">
                    <svg width="18" height="18" viewBox="0 0 48 48">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                        <path fill="none" d="M0 0h48v48H0z"/>
                    </svg>
                    Continue with Google
                </button>

                <div class="links">
                    <a href="#" onclick="forgotPassword()">Forgot Password?</a>
                    <a href="#" onclick="createAccount()">Create Account</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
                 sendPasswordResetEmail, onAuthStateChanged,
                 GoogleAuthProvider, signInWithPopup }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // ── Fetch config from Python backend ──────────────────────────────
        let auth;
        try {
            const res = await fetch('/firebase-config');
            if (!res.ok) throw new Error('Config fetch failed');
            const firebaseConfig = await res.json();
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
        } catch (e) {
            document.getElementById('configLoader').innerHTML =
                '<p style="color:#dc2626;padding:20px;text-align:center;">⚠️ Could not load app config.<br>Make sure the backend is running.</p>';
            throw e;
        }
        // ─────────────────────────────────────────────────────────────────

        // Hide config loader, start splash
        document.getElementById('configLoader').remove();

        // If already signed in, skip splash → go straight to dashboard
        onAuthStateChanged(auth, user => {
            if (user) window.location.href = "index.html";
        });

        // Slide left after loader bar finishes (~3.1s total)
        setTimeout(() => {
            document.getElementById('wrapper').classList.add('slide-done');
        }, 3100);

        // ── Login ──
        window.handleLogin = async function(e) {
            e.preventDefault();
            const btn    = document.getElementById('loginBtn');
            const errBox = document.getElementById('errorMsg');
            const email  = document.getElementById('email').value.trim();
            const pass   = document.getElementById('password').value;

            errBox.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Signing in…';

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = "index.html";
            } catch (err) {
                btn.disabled = false;
                btn.innerHTML = 'Sign In';
                errBox.textContent = friendlyError(err.code);
                errBox.style.display = 'block';
            }
        };

        // ── Forgot Password ──
        window.forgotPassword = async function() {
            const email = document.getElementById('email').value.trim();
            if (!email) { alert('Enter your email address first, then click Forgot Password.'); return; }
            try {
                await sendPasswordResetEmail(auth, email);
                alert(`Password reset email sent to ${email}`);
            } catch (err) { alert(friendlyError(err.code)); }
        };

        // ── Create Account ──
        window.createAccount = async function() {
            const email = prompt('Enter your email:');
            if (!email) return;
            const pass = prompt('Choose a password (min 6 characters):');
            if (!pass) return;
            try {
                await createUserWithEmailAndPassword(auth, email, pass);
                alert('Account created! You are now signed in.');
                window.location.href = "index.html";
            } catch (err) { alert(friendlyError(err.code)); }
        };

        // ── Google Sign-In ──
        window.signInWithGoogle = async function() {
            const btn    = document.getElementById('googleBtn');
            const errBox = document.getElementById('errorMsg');
            errBox.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner" style="border-color:rgba(0,0,0,0.15);border-top-color:#4285F4;"></span>Connecting…';

            try {
                const provider = new GoogleAuthProvider();
                await signInWithPopup(auth, provider);
                window.location.href = "index.html";
            } catch (err) {
                btn.disabled = false;
                btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg> Continue with Google`;
                if (err.code !== 'auth/popup-closed-by-user') {
                    errBox.textContent = friendlyError(err.code);
                    errBox.style.display = 'block';
                }
            }
        };

        function friendlyError(code) {
            const map = {
                'auth/user-not-found':        'No account found with this email.',
                'auth/wrong-password':         'Incorrect password. Please try again.',
                'auth/invalid-email':          'Please enter a valid email address.',
                'auth/too-many-requests':      'Too many attempts. Please wait a moment.',
                'auth/email-already-in-use':   'An account with this email already exists.',
                'auth/weak-password':          'Password must be at least 6 characters.',
                'auth/invalid-credential':     'Invalid email or password.',
                'auth/popup-blocked':          'Popup was blocked. Please allow popups for this site.',
                'auth/account-exists-with-different-credential': 'An account already exists with this email. Try signing in with email/password.',
            };
            return map[code] || 'Something went wrong. Please try again.';
        }
    </script>
</body>
</html>
