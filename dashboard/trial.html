<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KneeSense — Exercise Control</title>
  <style>
    :root{
      --primary-blue:#2563eb;--primary-blue-700:#1d4ed8;--secondary-gray:#6b7280;
      --success-green:#22c55e;--warning-orange:#f59e0b;--error-red:#ef4444;
      --background-light:#f5f7fa;--card-white:#ffffff;--text-dark:#111827;
      --text-light:#6b7280;--border-color:#e5e7eb;
      --shadow-sm:0 2px 8px rgba(0,0,0,.06);--shadow-md:0 8px 24px rgba(0,0,0,.10);--radius:12px;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,Arial,sans-serif;background:var(--background-light);color:var(--text-dark);line-height:1.6;min-height:100vh;}
    .container{max-width:1000px;margin:0 auto;padding:28px}
    .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:14px;}
    .header-title{display:flex;align-items:center;gap:12px}
    .header-title h1{font-size:1.8rem;letter-spacing:-.01em}
    .clinic-badge{background:var(--primary-blue);color:#fff;padding:4px 12px;border-radius:999px;font-size:.8rem;font-weight:600;}
    button{padding:10px 16px;border:1px solid transparent;border-radius:10px;background:var(--primary-blue);color:#fff;cursor:pointer;font-size:14px;font-weight:700;transition:transform .18s,box-shadow .18s,background .18s;}
    button:hover:not(:disabled){background:var(--primary-blue-700);transform:translateY(-1px);box-shadow:0 10px 18px rgba(37,99,235,.18);}
    button:disabled{background:#9ca3af;cursor:not-allowed;transform:none!important;box-shadow:none!important;}
    button.secondary{background:var(--secondary-gray)}
    button.secondary:hover:not(:disabled){background:#4b5563}
    button.ghost{background:transparent;border-color:var(--border-color);color:var(--text-dark);}
    button.ghost:hover:not(:disabled){background:#fff;border-color:#d1d5db;box-shadow:var(--shadow-sm);}
    button.icon-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 14px}
    button.teal{background:linear-gradient(135deg,#1a3a6b,#0d7e8a);}
    button.teal:hover:not(:disabled){background:linear-gradient(135deg,#0f2444,#0a6470);box-shadow:0 10px 18px rgba(13,126,138,.25);}
    button.success-btn{background:var(--success-green);}
    button.success-btn:hover:not(:disabled){background:#16a34a;box-shadow:0 10px 18px rgba(34,197,94,.25);}
    button.danger-btn{background:var(--error-red);}
    button.danger-btn:hover:not(:disabled){background:#dc2626;box-shadow:0 10px 18px rgba(239,68,68,.25);}
    .card{background:var(--card-white);border-radius:var(--radius);padding:18px;margin-bottom:18px;box-shadow:var(--shadow-sm);border:1px solid var(--border-color);}

    /* Info strip */
    .info-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1px;background:var(--border-color);border:1px solid var(--border-color);border-radius:var(--radius);overflow:hidden;margin-bottom:22px;}
    .info-cell{background:var(--card-white);padding:14px 18px;}
    .info-key{font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-light);font-weight:700;margin-bottom:4px;}
    .info-val{font-size:1rem;font-weight:800;color:var(--text-dark);}

    /* Status bar */
    .status-bar{display:flex;align-items:center;gap:12px;background:var(--card-white);border:1px solid var(--border-color);border-radius:var(--radius);padding:14px 20px;margin-bottom:22px;}
    .status-dot{width:12px;height:12px;border-radius:50%;background:#d1d5db;flex-shrink:0;transition:background .3s;}
    .status-dot.idle{background:#d1d5db;}
    .status-dot.calibrating{background:var(--warning-orange);animation:pulse .8s infinite alternate;}
    .status-dot.recording{background:var(--error-red);animation:pulse .5s infinite alternate;}
    .status-dot.done{background:var(--success-green);}
    @keyframes pulse{to{opacity:.4;transform:scale(1.3);}}
    .status-text{font-weight:700;font-size:.95rem;}
    .status-sub{font-size:.82rem;color:var(--text-light);margin-left:auto;}

    /* Control buttons grid */
    .controls-label{font-size:.8rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-light);font-weight:700;margin-bottom:12px;}
    .controls-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:22px;}
    .ctrl-btn{padding:20px 14px;border-radius:var(--radius);border:1px solid var(--border-color);background:var(--card-white);color:var(--text-dark);cursor:pointer;font-size:.9rem;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:8px;transition:transform .18s,box-shadow .18s,border-color .18s,background .18s;box-shadow:var(--shadow-sm);}
    .ctrl-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:var(--shadow-md);}
    .ctrl-btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;}
    .ctrl-btn .icon{font-size:1.6rem;}
    .ctrl-btn.calibrate:hover:not(:disabled){border-color:var(--warning-orange);background:#fffbeb;}
    .ctrl-btn.start-sample:hover:not(:disabled){border-color:var(--success-green);background:#f0fdf4;}
    .ctrl-btn.end-sample:hover:not(:disabled){border-color:var(--error-red);background:#fef2f2;}
    .ctrl-btn.view-data:hover:not(:disabled){border-color:var(--primary-blue);background:#eff6ff;}
    .ctrl-btn.view-analysis:hover:not(:disabled){border-color:#7c3aed;background:#f5f3ff;}
    .ctrl-btn.recording-active{border-color:var(--error-red);background:#fef2f2;animation:glowRed 1s infinite alternate;}
    @keyframes glowRed{to{box-shadow:0 0 16px rgba(239,68,68,.25);}}

    /* Signal preview */
    .signal-card{background:var(--card-white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);border:1px solid var(--border-color);}
    .signal-card h3{font-size:.8rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-light);font-weight:700;margin-bottom:14px;}

    .toast{position:fixed;bottom:20px;right:20px;background:var(--text-dark);color:#fff;padding:14px 16px;border-radius:12px;box-shadow:0 10px 22px rgba(0,0,0,.18);z-index:1000;animation:slideIn .25s ease;display:flex;align-items:center;gap:10px;}
    @keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
    @media(max-width:768px){.container{padding:18px}.top-bar{flex-direction:column;align-items:flex-start}.controls-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:480px){.controls-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <div class="header-title">
      <h1>Exercise Control</h1>
      <span class="clinic-badge">KneeSense™ Portal</span>
    </div>
    <button class="secondary icon-btn" onclick="window.location.href='trial.html'">← Back to Trial</button>
  </div>

  <!-- Info strip -->
  <div class="info-strip">
    <div class="info-cell"><div class="info-key">Patient</div><div class="info-val" id="infoPatient">—</div></div>
    <div class="info-cell"><div class="info-key">Exercise</div><div class="info-val" id="infoExercise">—</div></div>
    <div class="info-cell"><div class="info-key">Sessions</div><div class="info-val" id="infoSessions">—</div></div>
    <div class="info-cell"><div class="info-key">Current Score</div><div class="info-val" id="infoScore">—</div></div>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-dot idle" id="statusDot"></div>
    <span class="status-text" id="statusText">Idle — Ready to begin</span>
    <span class="status-sub" id="statusSub">Press Calibrate to start</span>
  </div>

  <!-- Controls -->
  <div class="controls-label">Controls</div>
  <div class="controls-grid">
    <button class="ctrl-btn calibrate" id="btnCalibrate" onclick="doCalibrate()">
      <span class="icon">⚙️</span>Calibrate
    </button>
    <button class="ctrl-btn start-sample" id="btnStartSample" onclick="doStartSample()" disabled>
      <span class="icon">▶</span>Start Sample
    </button>
    <button class="ctrl-btn end-sample" id="btnEndSample" onclick="doEndSample()" disabled>
      <span class="icon">⏹</span>End Sample
    </button>
    <button class="ctrl-btn view-data" id="btnViewData" onclick="window.location.href='acquired.html'" disabled>
      <span class="icon">📊</span>View Acquired Data
    </button>
    <button class="ctrl-btn view-analysis" id="btnViewAnalysis" onclick="window.location.href='analysis.html'" disabled>
      <span class="icon">🧠</span>View Analysis
    </button>
  </div>

  <!-- Live signal preview -->
  <div class="signal-card">
    <h3>Live Signal Preview</h3>
    <canvas id="liveCanvas" height="100"></canvas>
  </div>
</div>

<div id="toastContainer"></div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  const STORAGE_KEY = 'aclRehabPatients';
  const patients = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  const patientId = Number(localStorage.getItem('trialPatientId'));
  const exerciseId = Number(localStorage.getItem('trialExerciseId'));
  const patient = patients.find(p => p.id === patientId);
  const exercise = patient?.exercises.find(e => e.id === exerciseId);

  if(patient && exercise){
    document.getElementById('infoPatient').textContent = patient.name;
    document.getElementById('infoExercise').textContent = exercise.name;
    document.getElementById('infoSessions').textContent = exercise.sessions;
    document.getElementById('infoScore').textContent = exercise.success + '%';
  }

  let state = 'idle';
  let liveChart = null;
  let liveInterval = null;

  const sampleData = JSON.parse(localStorage.getItem('acquiredData') || 'null');
  if(sampleData){
    document.getElementById('btnViewData').disabled = false;
    document.getElementById('btnViewAnalysis').disabled = false;
  }

  function setStatus(dotClass, text, sub){
    document.getElementById('statusDot').className = 'status-dot ' + dotClass;
    document.getElementById('statusText').textContent = text;
    document.getElementById('statusSub').textContent = sub;
  }

  function doCalibrate(){
    state = 'calibrating';
    setStatus('calibrating','Calibrating sensors…','Keep the patient still');
    document.getElementById('btnCalibrate').disabled = true;
    setTimeout(()=>{
      state = 'ready';
      setStatus('done','Calibration complete ✓','Ready to record');
      document.getElementById('btnStartSample').disabled = false;
      showToast('✅ Calibration complete');
    }, 3000);
  }

  function doStartSample(){
    state = 'recording';
    setStatus('recording','Recording…','Collecting sensor data from ESP32');
    document.getElementById('btnStartSample').disabled = true;
    document.getElementById('btnEndSample').disabled = false;
    document.getElementById('btnStartSample').classList.add('recording-active');
    showToast('🔴 Recording started');
  }

  function doEndSample(){
    state = 'done';
    setStatus('done','Sample complete ✓','Data acquired successfully');
    document.getElementById('btnEndSample').disabled = true;
    document.getElementById('btnStartSample').classList.remove('recording-active');
    document.getElementById('btnViewData').disabled = false;
    document.getElementById('btnViewAnalysis').disabled = false;
    generateMockData();
    showToast('✅ Sample saved — view acquired data');
  }

  function generateMockData(){
    const rows = Array.from({length:169},(_,i)=>({
      timestamp_ms: i*15,
      EMG_Quad_mV: (Math.sin(i*.18)*180+Math.random()*60+20).toFixed(2),
      EMG_Ham_mV:  (Math.cos(i*.14)*120+Math.random()*40+10).toFixed(2),
      EMG_Calf_mV: (Math.sin(i*.22)*90+Math.random()*30+5).toFixed(2),
      ACC_Quad_X_g:(0.19+Math.random()*.02).toFixed(4),ACC_Quad_Y_g:(0.18+Math.random()*.02).toFixed(4),ACC_Quad_Z_g:(0.96+Math.random()*.02).toFixed(4),
      GYR_Quad_X_dps:(Math.random()*.6-.3).toFixed(3),GYR_Quad_Y_dps:(Math.random()*.6-.3).toFixed(3),GYR_Quad_Z_dps:(1+Math.random()*.3).toFixed(3),
      Pitch_Quad_deg:(-11+Math.random()*2).toFixed(2),Roll_Quad_deg:(10.5+Math.random()).toFixed(2),
      ACC_Ham_X_g:(0.33+Math.random()*.02).toFixed(4),ACC_Ham_Y_g:(-0.31+Math.random()*.02).toFixed(4),ACC_Ham_Z_g:(-0.94+Math.random()*.02).toFixed(4),
      GYR_Ham_X_dps:(Math.random()*.6-.3).toFixed(3),GYR_Ham_Y_dps:(Math.random()*.4-.2).toFixed(3),GYR_Ham_Z_dps:(Math.random()*.6-.3).toFixed(3),
      Pitch_Ham_deg:(-18.8+Math.random()*.1).toFixed(2),Roll_Ham_deg:(-161.6+Math.random()*.1).toFixed(2),
      ACC_Calf_X_g:(-0.61+Math.random()*.02).toFixed(4),ACC_Calf_Y_g:(0.76+Math.random()*.02).toFixed(4),ACC_Calf_Z_g:(-0.20+Math.random()*.02).toFixed(4),
      GYR_Calf_X_dps:(Math.random()*2-1).toFixed(3),GYR_Calf_Y_dps:(Math.random()*2-1).toFixed(3),GYR_Calf_Z_dps:(Math.random()*2-1).toFixed(3),
      Pitch_Calf_deg:(37.7+Math.random()*.1).toFixed(2),Roll_Calf_deg:(104.7+Math.random()*.1).toFixed(2),
      Angle_Quad_Ham_deg:(Math.sin(i*.12)*25+45+Math.random()*5).toFixed(2),
      Angle_Quad_Calf_deg:(Math.cos(i*.1)*20+80+Math.random()*4).toFixed(2),
      Angle_Ham_Calf_deg:(Math.sin(i*.09)*15+35+Math.random()*3).toFixed(2),
    }));
    localStorage.setItem('acquiredData', JSON.stringify(rows));
  }

  // Live chart
  const ctx = document.getElementById('liveCanvas').getContext('2d');
  liveChart = new Chart(ctx,{
    type:'line',
    data:{
      labels:Array(80).fill(''),
      datasets:[
        {label:'EMG Quad',data:Array(80).fill(0),borderColor:'#2563eb',borderWidth:1.5,pointRadius:0,fill:false,tension:.4},
        {label:'EMG Ham', data:Array(80).fill(0),borderColor:'#f59e0b',borderWidth:1.5,pointRadius:0,fill:false,tension:.4},
        {label:'EMG Calf',data:Array(80).fill(0),borderColor:'#22c55e',borderWidth:1.5,pointRadius:0,fill:false,tension:.4},
      ]
    },
    options:{
      animation:false,responsive:true,
      plugins:{legend:{labels:{color:'#6b7280',font:{size:11}}}},
      scales:{x:{display:false},y:{ticks:{color:'#6b7280'},grid:{color:'#e5e7eb'}}}
    }
  });

  setInterval(()=>{
    const t = Date.now();
    const active = state === 'recording';
    liveChart.data.datasets[0].data.push(active ? Math.sin(t*.003)*180+Math.random()*60+20 : Math.sin(t*.001)*8+Math.random()*3);
    liveChart.data.datasets[1].data.push(active ? Math.cos(t*.0025)*120+Math.random()*40+10 : Math.cos(t*.0012)*6+Math.random()*2);
    liveChart.data.datasets[2].data.push(active ? Math.sin(t*.0035)*90+Math.random()*30+5  : Math.sin(t*.0009)*5+Math.random()*2);
    liveChart.data.datasets.forEach(ds=>{ if(ds.data.length>80) ds.data.shift(); });
    liveChart.update('none');
  }, 80);

  function showToast(msg){
    const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
    document.body.appendChild(t); setTimeout(()=>t.remove(),2500);
  }
</script>
</body>
</html>
